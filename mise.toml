[tools]
node = "20"
java = "17"

[tasks]
"dev" = "npm run dev --prefix frontend & ./gradlew bootRun -p backend"
"build:frontend" = "npm run build --prefix frontend"
"build:backend" = "./gradlew build -p backend"
"build:all" = "mise run build:frontend && mise run build:backend"
"test:backend" = "./gradlew test -p backend"
