name: TripGather CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 1. 백엔드 빌드 및 테스트 (JaCoCo 커버리지 만족 여부 확인)
  backend-ci:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x backend/gradlew

      - name: Build & Run Tests with Gradle
        run: |
          cd backend
          ./gradlew build jacocoTestReport
          
      # 80% 커버리지 규칙 통과 여부는 JaCoCo 플러그인을 통해 빌드 시 자동 검증됩니다.

  # 2. 프론트엔드 빌드 및 린트 검증
  frontend-ci:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend (Vite)
        run: |
          cd frontend
          npm run build

  # 3. 배포 잡 (CD - main 브랜치 푸시 완료 시에만 트리거)
  deploy:
    name: Continuous Deployment
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Cloud Hub
        run: |
          echo "CD 파이프라인이 정상 동작 중입니다."
          echo "프로독션 인프라(AWS ECS/S3) 연동 자격 증명이 세팅되면 배포를 시작합니다."
